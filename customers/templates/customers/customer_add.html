{% extends "sales/layout.html" %}

{% block content %}
<section class="form-section">
    <div class="card">
        <div class="brand">
            <div class="brand-icon">👤</div>
            <h1>Add Customer</h1>
            <span class="subtitle">Enter customer details below</span>
        </div>

        <form method="post">
            {% csrf_token %}

            <div class="field">
                <label for="first_name">First Name</label>
                <input type="text" name="first_name" id="first_name" placeholder="Enter first name" required>
            </div>

            <div class="field">
                <label for="last_name">Last Name</label>
                <input type="text" name="last_name" id="last_name" placeholder="Enter last name" required>
            </div>

            <div class="field">
                <label for="email">Email</label>
                <input type="email" name="email" id="email" placeholder="Enter email address">
            </div>

            <div class="field">
                <label for="phone">Phone</label>
                <input type="text" name="phone" id="phone" placeholder="Enter phone number" maxlength="10" minlength="10">
            </div>

            <button type="submit" class="btn-primary">Add Customer</button>
        </form>

        <div class="back-link">
            <a href="{% url 'customer_list' %}">← Back to Customers</a>
        </div>
    </div>
</section>

<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        background-color: #f1f5f9;
        font-family: 'Segoe UI', system-ui, sans-serif;
        color: #1e293b;
    }

    .form-section {
        width: 100%;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
    }

    .card {
        background: #ffffff;
        border-radius: 1rem;
        padding: 2.5rem;
        width: 100%;
        max-width: 26rem;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        display: flex;
        flex-direction: column;
        gap: 1.75rem;
    }

    .brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.4rem;
        text-align: center;
    }

    .brand-icon {
        font-size: 2rem;
        background-color: #1e3a5f;
        padding: 0.75rem 0.9rem;
        border-radius: 0.75rem;
        margin-bottom: 0.5rem;
    }

    h1 {
        font-size: 1.5rem;
        font-weight: 700;
        color: #1e293b;
    }

    .subtitle {
        font-size: 0.875rem;
        color: #64748b;
    }

    form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }

    .field {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
    }

    label {
        font-size: 0.85rem;
        font-weight: 600;
        color: #374151;
    }

    input[type="text"],
    input[type="email"] {
        width: 100%;
        padding: 0.6rem 0.85rem;
        border: 1px solid #e2e8f0;
        border-radius: 0.5rem;
        font-size: 0.9rem;
        outline: none;
        color: #1e293b;
        transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]:focus,
    input[type="email"]:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .btn-primary {
        width: 100%;
        padding: 0.7rem;
        background-color: #1e3a5f;
        color: white;
        border: none;
        border-radius: 0.5rem;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s;
        margin-top: 0.25rem;
    }

    .btn-primary:hover {
        background-color: #162d4a;
    }

    .back-link {
        text-align: center;
        font-size: 0.875rem;
    }

    .back-link a {
        color: #2563eb;
        text-decoration: none;
    }

    .back-link a:hover {
        text-decoration: underline;
    }

    @media (max-width: 480px) {
        .card {
            padding: 1.75rem 1.25rem;
        }

        h1 {
            font-size: 1.3rem;
        }
    }
</style>
{% endblock %}
