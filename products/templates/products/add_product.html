{% extends "products/layout.html" %}

{% block content %}
    <section class="form-section">
        <div class="card">
            <div class="card-header">
                <h2>Add Product</h2>
                <span class="subtitle">Fill in the details to add a new product</span>
            </div>

            <form action="" method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="form-actions">
                    <a href="{% url 'product_list' %}" class="btn-secondary">← Back</a>
                    <button type="submit" class="btn-primary">Save Product</button>
                </div>
            </form>
        </div>
    </section>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #f1f5f9;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #1e293b;
        }

        .form-section {
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .card {
            background: #ffffff;
            border-radius: 1rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 32rem;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            gap: 1.75rem;
        }

        .card-header {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        h2 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1e293b;
        }

        .subtitle {
            font-size: 0.875rem;
            color: #64748b;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        form p {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            margin: 0;
        }

        form p label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #374151;
        }

        form p input,
        form p select,
        form p textarea {
            width: 100%;
            padding: 0.6rem 0.85rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            outline: none;
            color: #1e293b;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        form p input:focus,
        form p select:focus,
        form p textarea:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        form p textarea {
            resize: vertical;
            min-height: 6rem;
        }

        .form-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .btn-primary {
            padding: 0.6rem 1.5rem;
            background-color: #1e3a5f;
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-primary:hover {
            background-color: #162d4a;
        }

        .btn-secondary {
            padding: 0.6rem 1.2rem;
            background-color: #f1f5f9;
            color: #475569;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            transition: background-color 0.2s;
        }

        .btn-secondary:hover {
            background-color: #e2e8f0;
        }

        @media (max-width: 480px) {
            .card {
                padding: 1.5rem 1rem;
            }

            .form-actions {
                flex-direction: column-reverse;
            }

            .btn-primary,
            .btn-secondary {
                width: 100%;
                text-align: center;
            }
        }
    </style>
{% endblock %}
