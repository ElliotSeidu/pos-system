{% extends 'accounts/layout.html' %}

{% block content %}
    <section class="login-section">
        <div class="card">
            <div class="brand">
                <div class="brand-icon">🏬</div>
                <h1>Welcome Back</h1>
                <span class="subtitle">Sign in to continue</span>
            </div>

            {% if message %}
                <div class="alert">Invalid credentials. Please try again.</div>
            {% endif %}

            <form action="{% url 'login' %}" method="post">
                {% csrf_token %}
                <div class="field">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Enter your username" required autofocus>
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter your password" required>
                </div>
                <input type="submit" value="Sign In" class="btn-primary">
            </form>
        </div>
    </section>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #f1f5f9;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #1e293b;
        }

        .login-section {
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .card {
            background: #ffffff;
            border-radius: 1rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 26rem;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            gap: 1.75rem;
        }

        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            text-align: center;
        }

        .brand-icon {
            font-size: 2rem;
            background-color: #1e3a5f;
            padding: 0.75rem 0.9rem;
            border-radius: 0.75rem;
            margin-bottom: 0.5rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e293b;
        }

        .subtitle {
            font-size: 0.875rem;
            color: #64748b;
        }

        .alert {
            background-color: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 0.65rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #374151;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.6rem 0.85rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            outline: none;
            color: #1e293b;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 0.7rem;
            background-color: #1e3a5f;
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 0.25rem;
        }

        .btn-primary:hover {
            background-color: #162d4a;
        }

        @media (max-width: 480px) {
            .card {
                padding: 1.75rem 1.25rem;
            }

            h1 {
                font-size: 1.3rem;
            }
        }
    </style>
{% endblock %}
