{% extends "accounts/layout.html" %}

{% block content %}
<section class="register-section">
    <div class="card">
        <div class="brand">
            <div class="brand-icon">👤</div>
            <h1>Register New User</h1>
            <span class="subtitle">Create a new account</span>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="field">
                <label for="id_username">Username</label>
                {{ form.username }}
            </div>

            <div class="field">
                <label for="id_email">Email</label>
                {{ form.email }}
            </div>

            <div class="field">
                <label for="id_password1">Password</label>
                <input type="password" name="password1" id="id_password1" placeholder="Enter password" required>
            </div>

            <div class="field">
                <label for="id_password2">Confirm Password</label>
                <input type="password" name="password2" id="id_password2" placeholder="Confirm password" required>
            </div>

            <div class="field">
                <label for="id_role">Role</label>
                <select name="role" id="id_role" required>
                    <option value="" disabled selected>Select Role</option>
                    <option value="cashier">Cashier</option>
                    <option value="manager">Manager</option>
                    <option value="admin">Admin</option>
                </select>
            </div>

            <input type="submit" value="Register User" class="btn-primary">
        </form>

        <div class="back-link">
            <a href="{% url 'dashboard' %}">← Back to Dashboard</a>
        </div>
    </div>
</section>

<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        background-color: #f1f5f9;
        font-family: 'Segoe UI', system-ui, sans-serif;
        color: #1e293b;
    }

    .register-section {
        width: 100%;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
    }

    .card {
        background: #ffffff;
        border-radius: 1rem;
        padding: 2.5rem;
        width: 100%;
        max-width: 26rem;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        display: flex;
        flex-direction: column;
        gap: 1.75rem;
    }

    .brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.4rem;
        text-align: center;
    }

    .brand-icon {
        font-size: 2rem;
        background-color: #1e3a5f;
        padding: 0.75rem 0.9rem;
        border-radius: 0.75rem;
        margin-bottom: 0.5rem;
    }

    h1 {
        font-size: 1.5rem;
        font-weight: 700;
        color: #1e293b;
    }

    .subtitle {
        font-size: 0.875rem;
        color: #64748b;
    }

    .alert {
        padding: 0.65rem 1rem;
        border-radius: 0.5rem;
        font-size: 0.875rem;
        border: 1px solid;
    }

    .alert-error {
        background-color: #fef2f2;
        border-color: #fecaca;
        color: #dc2626;
    }

    .alert-success {
        background-color: #f0fdf4;
        border-color: #bbf7d0;
        color: #16a34a;
    }

    form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }

    .field {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
    }

    label {
        font-size: 0.85rem;
        font-weight: 600;
        color: #374151;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    select {
        width: 100%;
        padding: 0.6rem 0.85rem;
        border: 1px solid #e2e8f0;
        border-radius: 0.5rem;
        font-size: 0.9rem;
        outline: none;
        color: #1e293b;
        transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus,
    select:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .btn-primary {
        width: 100%;
        padding: 0.7rem;
        background-color: #1e3a5f;
        color: white;
        border: none;
        border-radius: 0.5rem;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s;
        margin-top: 0.25rem;
    }

    .btn-primary:hover {
        background-color: #162d4a;
    }

    .back-link {
        text-align: center;
        font-size: 0.875rem;
    }

    .back-link a {
        color: #2563eb;
        text-decoration: none;
    }

    .back-link a:hover {
        text-decoration: underline;
    }

    @media (max-width: 480px) {
        .card {
            padding: 1.75rem 1.25rem;
        }

        h1 {
            font-size: 1.3rem;
        }
    }
</style>
{% endblock %}
